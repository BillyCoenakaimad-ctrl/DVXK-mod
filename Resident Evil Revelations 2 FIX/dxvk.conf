# Disables modern Windows 'Fullscreen Optimizations' and DWM interference
# This is the most important line for replicating Win 7 behavior
dxgi.tearFree = False

# Forces the OS to handle the display as a dedicated exclusive window
# Win 7 was much better at "Exclusive Fullscreen" than Win 10
dxgi.numBackBuffers = 2
d3d9.numBackBuffers = 2

# Prevents Windows 10's aggressive VRAM 'paging' which causes micro-stutters
# #imp: This forces DXVK to manage memory itself rather than letting the OS do it.
d3d9.memory_pool = "system"

# Reduces the "Windows 10 Input Lag" feel by limiting frame queueing
d3d9.maxFrameLatency = 1

# Helps with the "Flashlight Stutter" on modern OS versions
d3d9.forceSwapchainMSAA = 0