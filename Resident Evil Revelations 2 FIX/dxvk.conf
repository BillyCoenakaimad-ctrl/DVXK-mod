

# --- The Handshake Fix ---
# We keep this because it fixed your movement stutters
d3d9.allowDirectBufferMapping = False

# --- The Memory Fix ---
# Switch this to False. On some Intel 630 drivers, "True" 
# can actually cap the FPS because it over-manages the RAM.
d3d9.memoryStream = False

# --- Keep these for Explosion Stability ---
d3d9.floatEmulation = 0
dxvk.numBackBuffers = 3
d3d9.maxFrameRate = 60
d3d9.presentInterval = 1
dxvk.hud = fps